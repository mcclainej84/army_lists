<section class="wizard-step">
  <a class="back-link" routerLink="/">← {{ 'conflicts.back' | transloco }}</a>
  <h1>{{ 'conflicts.title' | transloco }}</h1>

  @if (conflicts$ | async; as conflicts) {
    @if (conflicts.length) {
      <div class="card-grid">
        @for (conflict of conflicts; track conflict.id) {
          <a class="card" [routerLink]="['/juegos', gameCode, 'conflictos', conflict.code, 'facciones']">
            {{ conflict.name }}
          </a>
        }
      </div>
    } @else {
      <p class="coming-soon">{{ 'conflicts.comingSoon' | transloco }}</p>
    }
  }
</section>
