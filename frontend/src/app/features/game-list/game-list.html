<section class="wizard-step">
  <h1>{{ 'games.title' | transloco }}</h1>

  @if (games$ | async; as games) {
    <div class="card-grid">
      @for (game of games; track game.id) {
        <a class="card game-card" [routerLink]="['/juegos', game.code]">
          @if (logoFor(game); as logo) {
            <img [src]="logo" [alt]="game.name" class="game-logo" />
          } @else {
            {{ game.name }}
          }
        </a>
      }
    </div>
  } @else {
    <p>{{ 'games.loading' | transloco }}</p>
  }
</section>
