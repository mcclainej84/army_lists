name: Deploy to GitHub Pages

# Compila el catalogo estatico (backend/src/scripts/generateStaticCatalog.ts) y la
# app Angular, y publica el resultado en GitHub Pages. No hace falta servidor ni
# base de datos: todo el catalogo se sirve como JSON estatico junto al frontend.
#
# Configuracion previa en GitHub (una sola vez):
#   Settings -> Pages -> Source: "GitHub Actions"

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Instalar dependencias del backend (solo para generar el catalogo)
        working-directory: backend
        run: npm ci

      - name: Generar catalogo JSON estatico
        working-directory: backend
        run: npm run build:static

      - name: Instalar dependencias del frontend
        working-directory: frontend
        run: npm ci

      - name: Compilar Angular
        working-directory: frontend
        run: npx ng build --configuration production --base-href "/${{ github.event.repository.name }}/"

      - name: Subir artefacto de Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist/frontend/browser

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Desplegar en GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
